name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dir="target/${{ matrix.target }}/release"
          tar -C "$dir" -czf "chaff-${{ matrix.target }}.tar.gz" chaff

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "target/${{ matrix.target }}/release"
          Compress-Archive -Path "$dir/chaff.exe" -DestinationPath "chaff-${{ matrix.target }}.zip"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chaff-${{ matrix.target }}.tar.gz
            chaff-${{ matrix.target }}.zip
